name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  security-scan:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract image from deployment.yaml
        id: get-image
        run: |
          IMAGE=$(yq '.spec.template.spec.containers[0].image' app/deployment.yaml)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
      
      - name: Scan secrets in source code (Gitleaks)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source app/ --no-git --exit-code 1

      - name: Scan bad practices in PHP/HTML/CSS (Semgrep)
        run: |
          sudo apt-get install -y python3-venv -q
          python3 -m venv /tmp/semgrep-venv
          /tmp/semgrep-venv/bin/pip install semgrep -q
          /tmp/semgrep-venv/bin/semgrep scan app/ --config p/php --config p/secrets --config p/owasp-top-ten --error

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.get-image.outputs.image }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Generate ConfigMap from index.html
        run: |
          kubectl create configmap nginx-html \
            --from-file=index.html=app/index.html \
            --dry-run=client -o yaml > app/configmap.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add app/configmap.yaml
          git commit -m "chore: update configmap from index.html [skip ci]" || echo "Nothing to commit"
          git push
