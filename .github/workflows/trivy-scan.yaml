name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract image from deployment.yaml
        id: get-image
        run: |
          HARBOR_IMAGE=$(yq '.spec.template.spec.containers[0].image' app/deployment.yaml)
          CLEAN_IMAGE=$(echo $HARBOR_IMAGE | sed 's|10.6.0.190:80/proxy/||')
          echo "image=$CLEAN_IMAGE" >> $GITHUB_OUTPUT

      - name: Run Trivy scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.get-image.outputs.image }}
          format: json
          output: trivy-results.json
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Run Semgrep scan
        id: semgrep
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep --config p/php --config p/secrets app/ --json > semgrep-results.json || true

      - name: Check for security issues
        run: |
          if [ "${{ steps.trivy.outcome }}" == "failure" ]; then
            echo "Trivy found critical/high vulnerabilities"
            exit 1
          fi
          SEMGREP_COUNT=$(cat semgrep-results.json | jq '.results | length' 2>/dev/null || echo 0)
          if [ "$SEMGREP_COUNT" -gt 0 ]; then
            echo "Semgrep found $SEMGREP_COUNT issues"
            exit 1
          fi

      - name: Annotate deployment.yaml
        run: |
          SCAN_DATE=$(date -u +"%Y-%m-%d")
          if [ "${{ steps.trivy.outcome }}" == "failure" ]; then
            yq -i '.metadata.annotations["security/critical-cve"] = "true"' app/deployment.yaml
          else
            yq -i '.metadata.annotations["security/critical-cve"] = "false"' app/deployment.yaml
          fi
          yq -i '.metadata.annotations["security/last-scan"] = "'$SCAN_DATE'"' app/deployment.yaml

      - name: Commit and push annotations
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add app/deployment.yaml
          git commit -m "chore: update security annotations [skip ci]" || echo "Nothing to commit"
          git push
