name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  security-scan:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract image from deployment.yaml
        id: get-image
        run: |
          IMAGE=$(yq '.spec.template.spec.containers[0].image' app/deployment.yaml)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.get-image.outputs.image }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Run Trivy filesystem scan (HTML/CSS/PHP)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app/
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Generate ConfigMap from index.html
        run: |
          kubectl create configmap nginx-html \
            --from-file=index.html=app/index.html \
            --dry-run=client -o yaml > app/configmap.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add app/configmap.yaml
          git commit -m "chore: update configmap from index.html [skip ci]" || echo "Nothing to commit"
          git push
