name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract image from deployment.yaml
        id: get-image
        run: |
          HARBOR_IMAGE=$(yq '.spec.template.spec.containers[0].image' app/deployment.yaml)
          CLEAN_IMAGE=$(echo $HARBOR_IMAGE | sed 's|10.6.0.190:80/proxy/||')
          echo "image=$CLEAN_IMAGE" >> $GITHUB_OUTPUT

      - name: Run Trivy scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.get-image.outputs.image }}
          format: json
          output: trivy-results.json
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Run Semgrep scan
        id: semgrep
        continue-on-error: true
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/php
            p/html
            p/secrets
          generateSarif: false
          output: semgrep-results.json

      - name: Generate results.json
        run: |
          SCAN_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TRIVY_STATUS="${{ steps.trivy.outcome }}"
          SEMGREP_STATUS="${{ steps.semgrep.outcome }}"

          # Compter les vulnérabilités Trivy
          CRITICAL=$(cat trivy-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' 2>/dev/null || echo 0)
          HIGH=$(cat trivy-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' 2>/dev/null || echo 0)

          # Compter les findings Semgrep
          SEMGREP_COUNT=$(cat semgrep-results.json | jq '.results | length' 2>/dev/null || echo 0)

          cat > app/results.json << EOF
          {
            "scan_date": "$SCAN_DATE",
            "image": "${{ steps.get-image.outputs.image }}",
            "trivy": {
              "status": "$TRIVY_STATUS",
              "critical": $CRITICAL,
              "high": $HIGH
            },
            "semgrep": {
              "status": "$SEMGREP_STATUS",
              "findings": $SEMGREP_COUNT
            }
          }
          EOF

      - name: Annotate deployment.yaml
        run: |
          SCAN_DATE=$(date -u +"%Y-%m-%d")
          if [ "${{ steps.trivy.outcome }}" == "failure" ]; then
            yq -i '.metadata.annotations["security/critical-cve"] = "true"' app/deployment.yaml
          else
            yq -i '.metadata.annotations["security/critical-cve"] = "false"' app/deployment.yaml
          fi
          yq -i '.metadata.annotations["security/last-scan"] = "'$SCAN_DATE'"' app/deployment.yaml

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add app/results.json app/deployment.yaml
          git commit -m "chore: update security scan results [skip ci]"
          git push
